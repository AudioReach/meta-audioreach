# yaml-language-server: $schema=https://raw.githubusercontent.com/siemens/kas/master/kas/schema-kas.json

header:
  version: 14

distro: poky

defaults:
  repos:
    branch: scarthgap

repos:
  oe-core:
    url: https://github.com/openembedded/openembedded-core
    layers:
      meta:

  bitbake:
    url: https://github.com/openembedded/bitbake
    branch: "2.8"   # pin BitBake to 2.8; DO NOT add layers here

  meta-yocto:
    url: https://git.yoctoproject.org/meta-yocto
    layers:
      meta-poky:

  meta-raspberrypi:
    url: git://git.yoctoproject.org/meta-raspberrypi
    layers:
      meta-raspberrypi:

  meta-openembedded:
    url: https://git.openembedded.org/meta-openembedded
    layers:
      meta-oe:
      meta-python:
      meta-multimedia:
      meta-networking:

  meta-audioreach:
    url: https://github.com/AudioReach/meta-audioreach
    branch: scarthgap
    layers:
      .:

local_conf_header:

  are_support: |
    PACKAGECONFIG:pn-audioreach-graphmgr = "are_on_apps use_default_acdb_path"
    PACKAGECONFIG:pn-audioreach-graphservices = "are_on_apps"

  image_install: |
    # Leading space prevents accidental concatenation
    IMAGE_INSTALL:append = " audioreach-graphservices tinyalsa audioreach-graphmgr audioreach-engine audioreach-conf"

  extra: |
    EXTRA_IMAGE_FEATURES = "allow-empty-password empty-root-password allow-root-login"

  license-accept: |
    LICENSE_FLAGS_ACCEPTED = "synaptics-killswitch"

machine: raspberrypi4
target: core-image-sato
build_system: oe
