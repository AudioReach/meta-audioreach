---
name: post_merge_build
on:
  workflow_dispatch:
    inputs:
      testplan:
        description: 'Test plan name to use in job generation (lava-test-plans)'
        required: false
        type: string
        default: 'post-merge'
  push:
    branches:
      - knp
    paths-ignore:
      - '.github/**'

jobs:
  load_parameters:
    uses: ./.github/workflows/loading.yml

  flat_build:
    needs: load_parameters
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      build_matrix: ${{ needs.load_parameters.outputs.build_matrix }}
      build_type: flat_build    # Remove build_command, use from matrix

  sdk_build:
    needs: [load_parameters, flat_build]
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      build_matrix: ${{ needs.load_parameters.outputs.build_matrix }}
      build_type: sdk_build    # Remove build_command, use from matrix

  filter_test_matrix:
    needs: load_parameters
    runs-on: ubuntu-latest
    outputs:
      test_matrix: ${{ steps.filter.outputs.test_matrix }}
    steps:
      - id: filter
        shell: bash
        run: |
          MATRIX='${{ needs.load_parameters.outputs.build_matrix }}'
          echo "RAW build_matrix:"
          echo "$MATRIX"
          echo "Validating JSON..."
          echo "$MATRIX" | jq . >/dev/null

          # Validate and filter matrix
          FILTERED=$(
            echo "$MATRIX" | jq -c '
            if type == "object" then
              to_entries
              | map(select(.value.testing_enabled == true))
              | from_entries
            elif type == "array" then
              map(select(.testing_enabled == true))  # Preserve all fields including build_commands
            else
              error("Unsupported build_matrix JSON type: " + (type|tostring))
            end
            '
          )

          echo "Filtered matrix (pretty):"
          echo "$FILTERED" | jq .
          echo "test_matrix=$FILTERED" >> "$GITHUB_OUTPUT"

  tests:
    needs: [load_parameters, flat_build, filter_test_matrix]
    if: ${{ always() && needs.flat_build.result != 'skipped' }}
    uses: ./.github/workflows/test.yml
    secrets: inherit
    with:
      build_matrix: ${{ needs.filter_test_matrix.outputs.test_matrix }}
      testplan: ${{ inputs.testplan != '' && inputs.testplan || 'post-merge' }}
