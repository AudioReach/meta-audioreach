---
name: Build
description: Build the project using a Docker container
inputs:
  docker_image:
    description: Docker image to use for the build job
    required: true
  kas_file:
    description: KAS file to use for the build job
    required: true
  machine_name:
    description: Yocto MACHINE name to use for artifact paths
    required: true
  image_name:
    description: Yocto image name to use for artifact paths
    required: true
  build_command:
    description: Command to run for the build
    required: false
    default: "bitbake qcom-multimedia-image"
  build_type:
    description: Type of build to perform (flat_build or sdk_build)
    required: false
    default: "flat_build"
  build_matrix:
    description: Build matrix containing configuration
    required: true

runs:
  using: "composite"
  steps:
    - name: Initialize env (MACHINE, file list)
      shell: bash
      run: |
        #!/bin/bash
        set -e
        echo "MACHINE=${{ inputs.machine_name }}" >> $GITHUB_ENV
        KAS_BASE="$(basename "${{ inputs.kas_file }}")"
        ARTIFACT_KEY="${KAS_BASE%.*}"
        echo "ARTIFACT_KEY=${ARTIFACT_KEY}" >> $GITHUB_ENV
        echo "ARTIFACT_KEY_BASENAME=${ARTIFACT_KEY}" >> $GITHUB_ENV
        filepath="${{ github.workspace }}/${{ inputs.machine_name }}_${{ inputs.build_type }}_${ARTIFACT_KEY}_file_list.txt"
        echo "filepath=${filepath}" >> $GITHUB_ENV
        : > "$filepath"

    - name: Build ${{ env.MACHINE }}
      shell: bash
      run: |
        #!/bin/bash
        set -e
        filepath="${{ github.workspace }}/${{ env.MACHINE }}_${{ inputs.build_type }}_${{ env.ARTIFACT_KEY }}_file_list.txt"
        echo "filepath=${filepath}" >> $GITHUB_ENV
        touch $filepath
        USER_ID=$(id -u)
        GROUP_ID=$(id -g)
        USER=$(whoami)
        WORKSPACE=${{ github.workspace }}/..
        USER_HOME="/home/$USER"
        echo "::group::$(printf '__________ %-100s' 'build' | tr ' ' _)"
        docker run \
          --rm \
          --user $(id -u):$(id -g) \
          -v ${WORKSPACE}:${USER_HOME}/workspace \
          -w ${USER_HOME}/workspace \
          --privileged \
          --cpus=48 \
          --memory=96g \
          --ulimit nofile=1048576:1048576 \
          ${{ inputs.docker_image }} \
          bash -c "
            set -e
            kas shell ${{ inputs.kas_file }} -c '
              umask 022
              ${{ inputs.build_command }}
            '
          "
        echo "::endgroup::"

    - name: Create tar archive for the build
      if: ${{ inputs.build_type == 'flat_build' }}
      shell: bash
      run: |
        #!/bin/bash
        set -ex
        KAS_FILE="${{ inputs.kas_file }}"
        KAS_FILE="${KAS_FILE##*/}"
        KAS_FILE="${KAS_FILE%.*}"
        IMAGE_NAME="${{ inputs.image_name }}"
        MACHINE=${{ env.MACHINE }}
        
        cd ..
        BUILD_DIR=build
        PUB_DIR=${{ github.workspace }}/pub/${MACHINE}/flat_build
        mkdir -p "$PUB_DIR"
        
        cd "$BUILD_DIR/tmp/deploy/images/${IMAGE_NAME}"
        
        # Handle different image types
        if [ "$MACHINE" = "raspberrypi4" ]; then
          # For Raspberry Pi
          if [ -f "${IMAGE_NAME}-${MACHINE}.tar.bz2" ]; then
            cp "${IMAGE_NAME}-${MACHINE}.tar.bz2" "$PUB_DIR/${IMAGE_NAME}-${KAS_FILE}.tar.bz2"
            echo "${PUB_DIR}/${IMAGE_NAME}-${KAS_FILE}.tar.bz2" >> ${{ env.filepath }}
          
          fi
        else
          # For QCOM devices
          
          cp "qcom-multimedia-image-${IMAGE_NAME}.rootfs.qcomflash.tar.gz" "$PUB_DIR/qcom-multimedia-image-${KAS_FILE}.rootfs.qcomflash.tar.gz"
          echo "${PUB_DIR}/qcom-multimedia-image-${KAS_FILE}.rootfs.qcomflash.tar.gz" >> ${{ env.filepath }}

        fi
        
        ls -larth "$PUB_DIR"
        echo "Build artifacts created in $PUB_DIR"

    - name: copy the sdk to the pub directory
      if: ${{ inputs.build_type == 'sdk_build' }}
      shell: bash
      run: |
        #!/bin/bash
        set -ex
        KAS_FILE="${{ inputs.kas_file }}"
        KAS_FILE="${KAS_FILE##*/}"
        KAS_FILE="${KAS_FILE%.*}"
        MACHINE="${{ env.MACHINE }}"
        
        cd ..
        cd build/tmp/deploy/sdk/
        
        # Handle different SDK patterns
        if [ "$MACHINE" = "raspberrypi4" ]; then
          # For Raspberry Pi
          sdk_file=$(ls poky-*.sh || ls core-image-*.sh)
        else
          # For QCOM devices
          sdk_file=$(ls qcom-distro-*.sh)
        fi
        
        # Check if SDK file was found
        if [ -z "$sdk_file" ]; then
          echo "Error: No SDK file found for $MACHINE"
          echo "Contents of sdk directory:"
          ls -la
          exit 1
        fi
        
        PUB_DIR=${{ github.workspace }}/pub/${{ env.MACHINE }}/sdk_build
        mkdir -p $PUB_DIR
        cp $sdk_file $PUB_DIR/sdk-${KAS_FILE}.sh
        echo "${PUB_DIR}/sdk-${KAS_FILE}.sh" >> ${{ env.filepath }}
        ls -larth $PUB_DIR
        echo "SDK artifacts created in $PUB_DIR"

    - name: Upload artifacts
      uses: Audioreach/meta-audioreach/.github/actions/aws-s3-exchanger@fix
      with:
        mode: multi-upload
        local_file: ${{ env.filepath }}
        s3_bucket: qli-prd-audior-gh-artifacts
      env:
        MACHINE: ${{ env.MACHINE }}
        BUILD_TYPE: ${{ inputs.build_type }}
        ARTIFACT_KEY: ${{ env.ARTIFACT_KEY }}
        ARTIFACT_KEY_BASENAME: ${{ env.ARTIFACT_KEY_BASENAME }}

    - name: Update Summary
      shell: bash
      run: |
        echo "## Build Summary for ${{ env.MACHINE }}" >> $GITHUB_STEP_SUMMARY
        echo '### :rocket: Build Successful!' >> $GITHUB_STEP_SUMMARY
        echo "- Machine: ${{ env.MACHINE }}" >> $GITHUB_STEP_SUMMARY
        echo "- Image: ${{ inputs.image_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- Config File: ${{ inputs.kas_file }}" >> $GITHUB_STEP_SUMMARY
        echo "- Build Type: ${{ inputs.build_type }}" >> $GITHUB_STEP_SUMMARY
        echo "- Build Command: ${{ inputs.build_command }}" >> $GITHUB_STEP_SUMMARY
