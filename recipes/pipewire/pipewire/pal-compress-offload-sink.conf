# PipeWire-Pulse drop-in: load the compress-offload forwarder module for PAL.
#
# This wires the Pulse-visible compress sink (pal_speaker_compress) through to
# the PAL compress sink (pal_sink_speaker_compress) using the
# module-compress-offload-forwarder introduced by the accompanying patch.

pulse.cmd = [
    { cmd = "load-module" args = "module-compress-offload-sink sink_name=pal_speaker_compress target_sink=pal_sink_speaker_compress codec=mp3 rate=48000 channels=2 bitrate=128000" flags = [ ] }
    { cmd = "load-module" args = "module-compress-offload-forwarder source_sink=pal_speaker_compress target_sink=pal_sink_speaker_compress codec=mp3 rate=48000 channels=2 bitrate=128000" flags = [ ] }
      ]
